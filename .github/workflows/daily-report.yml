name: CC通时通次播报

on:
  schedule:
    # 每天3次播报（北京时间 = UTC+8）
    - cron: '0 6 * * *'      # 14:00 北京时间
    - cron: '30 10 * * *'    # 18:30 北京时间
    - cron: '30 13 * * *'    # 21:30 北京时间
  workflow_dispatch:         # 支持手动触发

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies (root)
      run: npm install

    - name: Install dependencies (smartbi-export)
      run: cd smartbi-export && npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Run CC Call Report
      run: node index.js
      env:
        SMARTBI_USER: ${{ secrets.SMARTBI_USER }}
        SMARTBI_PASS: ${{ secrets.SMARTBI_PASS }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
