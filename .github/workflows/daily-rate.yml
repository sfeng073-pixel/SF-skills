name: 每日汇率推送

on:
  # 定时推送已取消，如需重新启用请取消下面 schedule 的注释
  # schedule:
  #   - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  push-rate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 执行推送
        run: node rate-push/index.js
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          TZ: Asia/Shanghai
