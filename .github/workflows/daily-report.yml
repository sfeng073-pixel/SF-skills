name: CC通时通次播报

on:
  schedule:
    # 每天3次播报（北京时间 = UTC+8）
    - cron: '0 6 * * *'      # 14:00 北京时间
    - cron: '30 10 * * *'    # 18:30 北京时间
    - cron: '30 13 * * *'    # 21:30 北京时间
  workflow_dispatch:         # 支持手动触发

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cc-call-report-skill
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Install dependencies (smartbi-export)
      working-directory: cc-call-report-skill/smartbi-export
      run: npm install

    - name: Run CC Call Report
      run: |
        sudo timedatectl set-timezone Asia/Shanghai
        export TZ=Asia/Shanghai
        node index.js
      env:
        SMARTBI_USER: ${{ secrets.SMARTBI_USER }}
        SMARTBI_PASS: ${{ secrets.SMARTBI_PASS }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        TZ: Asia/Shanghai
