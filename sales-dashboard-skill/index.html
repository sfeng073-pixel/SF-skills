<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售实时作战大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(16, 16, 24, 0.9);
            --gold: #d4af37;
            --gold-light: #f0d060;
            --gold-dark: #a08520;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: rgba(212, 175, 55, 0.2);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .dashboard {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            gap: 12px;
        }

        /* ========== 顶部标题 ========== */
        .header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #f0d060, #d4af37, #a08520);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-time {
            position: absolute;
            right: 0;
            font-size: 13px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        /* ========== 模块1：顶部KPI ========== */
        .module-kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            flex-shrink: 0;
        }

        .kpi-row {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .kpi-row + .kpi-row {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(212,175,55,0.1);
        }

        .kpi-item {
            flex: 1;
            text-align: center;
            min-width: 0;
        }

        .kpi-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            white-space: nowrap;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            font-variant-numeric: tabular-nums;
        }

        .kpi-value .unit {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 400;
            margin-left: 2px;
        }

        /* 完成度数字样式 */
        .kpi-pct {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .kpi-pct.high { color: var(--green); }
        .kpi-pct.mid { color: var(--orange); }
        .kpi-pct.low { color: var(--red); }

        .kpi-pct-bar {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .kpi-pct-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .kpi-pct-fill.high { background: var(--green); }
        .kpi-pct-fill.mid { background: var(--orange); }
        .kpi-pct-fill.low { background: var(--red); }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
            min-height: 0;
        }

        /* ========== 模块2：销售业绩排行 ========== */
        .module-ranking {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .module-header {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .module-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold);
            border-radius: 50%;
        }

        .module-title {
            font-size: 14px;
            color: var(--gold);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ========== 排名徽章 ========== */
        .rank-num {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .rank-num.r1 { background: linear-gradient(135deg, #f0d060, #d4af37); color: #1a1a1a; }
        .rank-num.r2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #1a1a1a; }
        .rank-num.r3 { background: linear-gradient(135deg, #cd7f32, #a0652a); color: #fff; }
        .rank-num.rn { background: rgba(212,175,55,0.1); color: var(--text-dim); }

        .rank-name { font-weight: 500; }
        .rank-gold { color: var(--gold-light); font-weight: 600; }
        .call-time { color: var(--gold-light); font-weight: 600; }

        /* ========== 通用数据表格 ========== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: auto;
        }

        .data-table th {
            padding: 10px 6px;
            text-align: center;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            white-space: nowrap;
        }

        .data-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(212,175,55,0.05);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .data-table tr:hover td {
            background: rgba(212,175,55,0.04);
        }

        .top3-row {
            background: rgba(212,175,55,0.03);
        }

        .scroll-row {
            transition: opacity 0.4s ease;
        }

        /* ========== 表格容器（模块2 & 模块3共用） ========== */
        .ranking-table,
        .call-table {
            flex: 1;
            overflow: hidden;
            padding: 0 8px;
            display: flex;
            flex-direction: column;
        }

        /* ========== 模块3：通时通次 ========== */
        .module-call {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 顶部标题 -->
        <header class="header">
            <h1 class="header-title">销售实时作战大屏</h1>
            <div class="header-time" id="header-time"></div>
        </header>

        <!-- 模块1：顶部KPI -->
        <div class="module-kpi" id="module-kpi"></div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 模块2：销售业绩排行 -->
            <div class="module-ranking">
                <div class="module-header">
                    <div class="module-dot"></div>
                    <span class="module-title">销售业绩排行</span>
                </div>
                <div class="ranking-table" id="ranking-table"></div>
            </div>

            <!-- 模块3：通时通次监控 -->
            <div class="module-call">
                <div class="module-header">
                    <div class="module-dot"></div>
                    <span class="module-title">台湾CC02组 - 通时通次监控</span>
                </div>
                <div class="call-table" id="call-table"></div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
