name: CC通时通次播报

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '30 10 * * *'
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cc-call-report-skill
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Install dependencies (smartbi-export)
      working-directory: cc-call-report-skill/smartbi-export
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Run CC Call Report
      run: node index.js
      env:
        SMARTBI_USER: ${{ secrets.SMARTBI_USER }}
        SMARTBI_PASS: ${{ secrets.SMARTBI_PASS }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
