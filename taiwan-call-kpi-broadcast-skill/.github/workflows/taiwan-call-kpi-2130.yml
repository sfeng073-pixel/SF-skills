name: Taiwan Call KPI 2130

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Taiwan call KPI 21:30
        run: |
          python3 -m pip install -r requirements.txt
          node scripts/run-taiwan-call-kpi-slot.js --slot 2130
